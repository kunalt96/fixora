<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fixora</title>
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-[#0d121a] text-white min-h-screen relative overflow-hidden">
    <!-- Main Container -->
    <main class="relative w-full min-h-screen flex flex-col items-center">
        <!-- SVG Graphic networks overlay -->
        <div class="node-network absolute inset-0 opacity-40 bg-stars"></div>

        <!-- Navbar -->
        <nav class="relative z-10 w-full flex justify-between items-center px-6 md:px-12 py-6 md:py-8">
            <div class="flex items-center gap-2">
                <a href="index.html" class="text-[22px] font-bold text-white flex items-center gap-2 hover:opacity-80">
                    <!-- SVG Checkmark styled uniquely -->
                    <span class="text-[#38bdf8] drop-shadow-[0_0_8px_rgba(56,189,248,0.8)]">✔</span>
                    Fixora
                </a>
            </div>
            <div class="hidden md:flex space-x-10 text-sm font-medium text-gray-300">
                <a href="index.html" class="hover:text-white flex items-center gap-1">Product <svg
                        class="w-3 h-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                    </svg></a>
                <a href="docs.html" class="hover:text-white">Docs</a>
                <a href="pricing.html" class="hover:text-white">Pricing</a>
            </div>
            <div class="text-sm font-medium text-gray-300 hover:text-white cursor-pointer mr-2">
                Login
            </div>
        </nav>

        <!-- Top Text Content -->
        <section class="relative z-10 flex flex-col items-center text-center mt-4 px-6">
            <h1 class="text-5xl md:text-[64px] font-bold leading-tight mb-4 tracking-tight">Fixora</h1>
            <p class="text-lg md:text-[22px] text-gray-300 mb-10 md:mb-14 leading-relaxed max-w-[400px]">
                Capture errors. Understand instantly. Fix faster.
            </p>
        </section>

        <!-- Visual Graphics (Red X to Green Check) -->
        <section
            class="relative z-10 flex items-center justify-center gap-4 md:gap-10 mb-12 px-6 py-8 md:py-12 w-full max-w-lg">
            <!-- X mark -->
            <div
                class="text-7xl md:text-[120px] text-red-500 glow-red font-black leading-none drop-shadow-lg scale-90 tracking-tighter">
                ✖</div>

            <div class="text-gray-500 flex items-center">
                <!-- Arrow -->
                <svg width="40" height="20" viewBox="0 0 40 20" fill="none" class="opacity-70">
                    <path d="M0 10H38M38 10L30 2M38 10L30 18" stroke="currentColor" stroke-width="1.5"
                        stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </div>

            <!-- Check mark -->
            <div
                class="text-7xl md:text-[120px] text-[#4ade80] glow-green font-black leading-none drop-shadow-lg tracking-tighter pb-4">
                ✔</div>
        </section>

        <!-- Bottom Text Content -->
        <section class="relative z-10 flex flex-col items-center justify-center text-center mt-4 px-14 max-w-3xl">
            <h2
                class="text-3xl md:text-[40px] font-bold leading-tight tracking-tight mb-8 md:mb-10 w-full max-w-[650px]">
                Capture errors. Understand instantly. Fix faster.
            </h2>

            <a href="docs.html"
                class="inline-block bg-gradient-to-b from-[#69f0ae] to-[#34d399] hover:brightness-110 transition-all duration-300 text-gray-900 px-8 py-3.5 rounded-[14px] font-bold text-[17px] shadow-[0_0_30px_rgba(52,211,153,0.3)]">
                Get Started Free
            </a>
        </section>

        <!-- Footer -->
        <footer class="relative z-10 mt-auto pb-10 text-[13px] text-gray-400/80 text-center w-full">
            🚀 Fixora is currently in development. Launching publicly soon!
        </footer>

    </main>

</body>

</html>
